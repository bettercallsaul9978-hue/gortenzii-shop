<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gortenzii.ing Shop</title>

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="toast" class="toast">
    Товар добавлен в корзину
</div>
<header class="header">

    <div class="logo-block">

        <img src="images/logo.png" alt="Gortenzii.ing" class="logo-img">

        <div>
            <h1>Gortenzii.ing shop</h1>
            <p>Каталог растений</p>
        </div>

    </div>

   <nav>
    <button id="homeBtn" class="nav-btn active">Главная</button>
    <button id="cartBtn" class="nav-btn">Корзина</button>
</nav>

</header>

<main>

    <div id="products"></div>

    <div id="cartPage" style="display:none;">
        <h2 class="section-title">Корзина</h2>

        <div id="cartItems"></div>

        <div id="cartTotal"></div>
    </div>

</main>

<div id="modal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close">
            ×
        </span>

        <div id="modalBody"></div>

    </div>

</div>

<script src="products.js"></script>
<script src="app.js"></script>

</body>
</html>
